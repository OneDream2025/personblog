<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="文章列表 - 个人博客">
  <title>文章列表 - 个人博客</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body data-page="articles" class="page">
  <header class="header">
    <div class="header__inner">
      <a href="../index.html" class="header__logo">
        <span class="header__logo-icon">B</span>
        <span>个人博客</span>
      </a>
      
      <nav class="header__nav">
        <ul class="header__nav-list">
          <li class="header__nav-item">
            <a href="../index.html" class="header__nav-link">首页</a>
          </li>
          <li class="header__nav-item">
            <a href="articles.html" class="header__nav-link header__nav-link--active">文章</a>
          </li>
          <li class="header__nav-item">
            <a href="about.html" class="header__nav-link">关于我</a>
          </li>
        </ul>
      </nav>
      
      <div class="header__actions">
        <button class="header__search-btn" aria-label="搜索">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        
        <button class="header__theme-toggle" aria-label="切换主题">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        
        <button class="header__menu-btn" aria-label="菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>
  
  <main class="main">
    <div class="container">
      <div class="page-articles">
        <div class="page-articles__main">
          <header class="page-articles__header">
            <h1 class="page-articles__title">全部文章</h1>
            <p class="page-articles__count">共 <span id="article-count">0</span> 篇文章</p>
          </header>
          
          <div class="page-articles__filters">
            <input type="text" class="page-articles__search-input" placeholder="搜索文章标题...">
          </div>
          
          <div class="page-articles__list">
          </div>
          
          <nav class="pagination"></nav>
        </div>
        
        <aside class="sidebar">
          <section class="sidebar__section">
            <h3 class="sidebar__title">分类</h3>
            <div class="sidebar__categories"></div>
          </section>
          
          <section class="sidebar__section">
            <h3 class="sidebar__title">热门标签</h3>
            <div class="sidebar__tags"></div>
          </section>
          
          <section class="sidebar__section">
            <h3 class="sidebar__title">推荐阅读</h3>
            <div class="sidebar__recommended"></div>
          </section>
        </aside>
      </div>
    </div>
  </main>
  
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__content">
        <p class="footer__copyright">
          &copy; 2026 个人博客. All rights reserved.
        </p>
        <div class="footer__social">
          <a href="#" class="footer__social-link" aria-label="GitHub">

            </svg>
          </a>
          <a href="#" class="footer__social-link" aria-label="微博">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M10.098 20.323c-3.977.391-7.414-1.406-7.672-4.02-.259-2.609 2.759-5.047 6.74-5.441 3.979-.394 7.413 1.404 7.671 4.018.259 2.6-2.759 5.049-6.739 5.443zm7.098-9.921c-.266-.078-.449-.131-.311-.472.305-.729.336-1.358.001-1.806-.627-.839-2.343-.795-4.311-.023 0 0-.618.27-.46-.218.301-.946.256-1.738-.214-2.197-.988-.966-3.615.091-5.863 2.36-1.686 1.703-2.663 3.511-2.663 5.077 0 2.992 3.836 4.813 7.587 4.813 4.917 0 8.191-2.857 8.191-5.126 0-1.371-1.155-2.149-1.957-2.408zm4.449-6.812c-1.568-1.744-3.881-2.406-6.074-2.026-.478.083-.79.539-.707 1.018.083.478.539.79 1.018.707 1.615-.28 3.313.205 4.468 1.489 1.154 1.284 1.453 3.025.941 4.582-.151.46.1.958.561 1.109.46.151.958-.1 1.109-.561.696-2.123.29-4.494-1.316-6.318zm-1.495 2.426c-.784-.872-1.941-1.203-3.037-1.013-.393.068-.654.444-.586.838.068.393.444.654.838.586.647-.112 1.327.082 1.788.595.46.512.574 1.206.357 1.827-.131.375.067.787.442.918.375.131.787-.067.918-.442.36-1.031.171-2.182-.72-3.309z"/>

          <a href="#" class="footer__social-link" aria-label="邮箱">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </footer>
  
  <div class="search-modal">
    <div class="search-modal__content">
      <div class="search-modal__header">
        <input type="text" class="search-modal__input" placeholder="搜索文章...">
        <button class="search-modal__close" aria-label="关闭">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="search-modal__results"></div>
    </div>
  </div>
  
  <button class="back-to-top" aria-label="返回顶部">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>
  
  <script type="module" src="../js/main.js"></script>
</body>
</html>
